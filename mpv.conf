# mpv 主配置文件 - 便携版
# 放在 mpv.exe 同级的 portable_config 目录内。
# 目标：面向 Windows 中文用户，少而稳，尽量不覆盖 mpv 默认行为。

# 视频输出与硬件加速
vo=gpu-next
gpu-api=d3d11
hwdec=auto
profile=high-quality

# 音频与字幕语言偏好
alang=zh,chi,zho,zh-CN,zh-TW,en,eng
slang=zh,chi,zho,zh-CN,zh-TW,en,eng
sub-auto=fuzzy

# 窗口与播放行为
force-window=yes
title=${filename}
autofit-larger=1920x1080
save-position-on-quit=yes
keep-open=yes

# 音量
volume=80

# 截图
screenshot-directory=~/Pictures/mpv-screenshots
screenshot-format=png
screenshot-template="%F-[%P]%wH.%wM.%wS"

# 可选画质试验：按需用 --profile=quality-deband 启用。
[quality-deband]
profile=high-quality
deband=yes

# 可选流畅试验：仅在帧率和显示器刷新率不匹配时使用。
[quality-smooth]
profile=high-quality
video-sync=display-resample
interpolation=yes
