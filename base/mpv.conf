# Shared mpv configuration.
# Platform-specific options live in platform/<name>/.

# Video output and hardware decoding.
vo=gpu-next
hwdec=auto
profile=high-quality

# Preferred audio and subtitle languages.
alang=zh,chi,zho,zh-CN,zh-TW,en,eng
slang=zh,chi,zho,zh-CN,zh-TW,en,eng
sub-auto=fuzzy

# Window and playback behavior.
force-window=yes
title=${filename}
autofit-larger=1920x1080
save-position-on-quit=yes
keep-open=yes

# Volume.
volume=80

# Screenshots.
screenshot-directory=~/Pictures/mpv-screenshots
screenshot-format=png
screenshot-template="%F-[%P]%wH.%wM.%wS"

# Optional quality experiment: enable with --profile=quality-deband.
[quality-deband]
profile=high-quality
deband=yes

# Optional smoothness experiment: use only when FPS and refresh rate mismatch.
[quality-smooth]
profile=high-quality
video-sync=display-resample
interpolation=yes
